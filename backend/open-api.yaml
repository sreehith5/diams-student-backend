openapi: 3.0.3
info:
  title: DIAMS — Application Gateway API
  description: |
    Digital Intelligent Attendance Management System — Student Backend / Application Gateway.
    
    This service acts as a proxy/adapter between the iOS app and four external services:
    
    | Service | Owner | Base URL |
    |---|---|---|
    | Professor Backend | Soham | https://attendance-management-gazr.onrender.com |
    | Face Recognition | Krishna | https://attendance-management-hpuj.onrender.com |
    | BLE/QR Microservice | Abhay | https://ble-qr-microservice.onrender.com |
    | AWS S3 | — | https://attendance-app-faces.s3.ap-southeast-2.amazonaws.com |
    
    Deployed at: https://diams-student-backend-app-gateway.onrender.com
  version: 3.0.0

servers:
  - url: https://diams-student-backend-app-gateway.onrender.com
    description: Production (Render)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Login — proxies to Soham's backend
  - name: Student
    description: Student screens — proxies to Soham + Krishna + S3
  - name: Professor
    description: Professor screens — proxies to Soham's backend
  - name: BLE
    description: Beacon validation — proxies to Abhay's backend
  - name: QR
    description: QR generation and validation — proxies to Abhay's backend

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by Soham's backend. Stored in iOS Keychain. Auto-refreshed on 401.

  schemas:
    User:
      type: object
      properties:
        id:    { type: string, example: ES22BTECH11033 }
        email: { type: string, example: es22btech11033@iith.ac.in }
        name:  { type: string, example: Sreehith Sanam }
        role:  { type: string, enum: [student, ta, prof, admin] }

    CourseAnalytics:
      type: object
      properties:
        code:       { type: string, example: CS3101 }
        name:       { type: string, example: Data Structures & Algorithms }
        room:       { type: string, example: LH-1 }
        attended:   { type: integer, example: 27 }
        total:      { type: integer, example: 50 }
        percentage: { type: number, example: 54.0 }

    ActiveSession:
      type: object
      properties:
        sessionId:       { type: string, example: a392cff1-5f99-434a-a0b2-0e691671d0e2 }
        courseCode:      { type: string, example: CS3101 }
        courseName:      { type: string, example: Data Structures & Algorithms }
        room:            { type: string, example: LH-1 }
        mode:            { type: string, enum: [BLE, QRCode, Manual] }
        startedAt:       { type: integer, description: Unix timestamp ms }
        durationSeconds: { type: integer, example: 300 }

    ProfessorSession:
      type: object
      properties:
        id:          { type: string, example: a392cff1-5f99-434a-a0b2-0e691671d0e2 }
        courseCode:  { type: string, example: CS3101 }
        mode:        { type: string, enum: [BLE, QRCode, Manual] }
        professorId: { type: string, example: prof_arora }
        startedAt:   { type: integer, description: Unix timestamp ms }

    Beacon:
      type: object
      properties:
        major: { type: string, example: "100" }
        minor: { type: string, example: "6786" }
        rssi:  { type: integer, example: -65 }

    Error:
      type: object
      properties:
        error: { type: string }

security:
  - bearerAuth: []

paths:

  # ═══════════════════════════════════════════════════════════════════════════
  # EXPOSED APIs (called by iOS app)
  # ═══════════════════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Auth]
      summary: Health check
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # ─── AUTH ──────────────────────────────────────────────────────────────────

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Proxies to Soham's /login. Accepts email or username.
        Returns JWT — store in Keychain, send as Bearer on all subsequent requests.
        JWT expires in 12h; app silently re-logs in using stored credentials.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, example: es22btech11033@iith.ac.in }
                username: { type: string, description: Alias for email (Android compat) }
                password: { type: string, example: stud123 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token:   { type: string }
                  user:    { $ref: "#/components/schemas/User" }
        "401":
          description: Invalid credentials

  # ─── STUDENT ───────────────────────────────────────────────────────────────

  /api/student/{studentId}/analytics:
    get:
      tags: [Student]
      summary: Attendance analytics per course
      description: Fetches enrolled courses + history from Soham's backend. Course info cached 10 min.
      parameters:
        - { name: studentId, in: path, required: true, schema: { type: string, example: ES22BTECH11033 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  studentId: { type: string }
                  courses:
                    type: array
                    items: { $ref: "#/components/schemas/CourseAnalytics" }

  /api/student/{studentId}/sessions:
    get:
      tags: [Student]
      summary: Active sessions not yet marked by this student
      description: |
        Checks /activeSession for each enrolled course in parallel.
        Filters out sessions already marked (checks /attendance/:sessionId).
        Polled every 30s by iOS app. Pull-to-refresh available.
      parameters:
        - { name: studentId, in: path, required: true, schema: { type: string, example: ES22BTECH11033 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/ActiveSession" }

  /api/student/markAttendance:
    post:
      tags: [Student]
      summary: Mark attendance for a session
      description: |
        Called after BLE/QR validation AND face verification both succeed.
        Forwards to Soham's /markAttendance using the student's own JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, sessionId]
              properties:
                studentId: { type: string, example: ES22BTECH11033 }
                sessionId: { type: string, example: a392cff1-5f99-434a-a0b2-0e691671d0e2 }
                method:    { type: string, enum: [BLE, QRCode, Manual], default: BLE }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /api/student/faceVerify:
    post:
      tags: [Student]
      summary: Verify student face via Krishna's service
      description: |
        Proxies 3 base64 frames to Krishna's /verify.
        user_id sent as email prefix (es22btech11033) to match enrollment key.
        Falls back to mock {status: "verified"} if Krishna's service is unreachable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, frames]
              properties:
                userId: { type: string, example: ES22BTECH11033 }
                frames: { type: array, items: { type: string }, description: 3 base64 JPEG strings from liveness detection }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [verified, failed, no_face] }

  /api/student/{studentId}/photoStatus:
    get:
      tags: [Student]
      summary: Face photo enrollment status
      description: |
        Fetches imageURL from Soham's /student/:id/profile.
        DiceBear avatar = not enrolled. Real S3 URL = enrolled.
        Fetches S3 HeadObject for LastModified (6-month expiry check).
        Returns presigned URL valid for 1 hour.
      parameters:
        - { name: studentId, in: path, required: true, schema: { type: string, example: ES22BTECH11033 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrolled:     { type: boolean }
                  enrolledAt:   { type: integer, description: Unix ms from S3 LastModified }
                  photoUrl:     { type: string, description: S3 presigned URL, valid 1hr }
                  isExpired:    { type: boolean, description: True if > 6 months since upload }
                  mustUpdateBy: { type: integer }

  /api/student/{studentId}/updatePhoto:
    post:
      tags: [Student]
      summary: Enroll or update face photo
      description: |
        1. Sends frames to Krishna's /enroll (user_id = email prefix)
        2. Uploads first frame to S3 with random UUID key (photos/<uuid>.jpg)
        3. Calls PATCH /student/:id/photo on Soham's backend with student's JWT
        No cooldown — student can update anytime. 6-month renewal enforced via photoStatus.
      parameters:
        - { name: studentId, in: path, required: true, schema: { type: string, example: ES22BTECH11033 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [frames]
              properties:
                frames: { type: array, items: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:   { type: string, enum: [uploaded, no_face, failed] }
                  imageURL: { type: string }

  # ─── PROFESSOR ─────────────────────────────────────────────────────────────

  /api/professor/{professorId}/courses:
    get:
      tags: [Professor]
      summary: Professor's courses
      parameters:
        - { name: professorId, in: path, required: true, schema: { type: string, example: prof_arora } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:   { type: string, example: CS3101 }
                        name:  { type: string }
                        venue: { type: string, example: LH-1 }
                        slot:  { type: string, example: A }

  /api/professor/{professorId}/activeSession:
    get:
      tags: [Professor]
      summary: Professor's current active session
      description: Checks all professor courses for an active session.
      parameters:
        - { name: professorId, in: path, required: true, schema: { type: string, example: prof_arora } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    nullable: true
                    allOf: [{ $ref: "#/components/schemas/ProfessorSession" }]

  /api/professor/session/start:
    post:
      tags: [Professor]
      summary: Start an attendance session
      description: |
        Forwards to Soham's /startSession using the professor's own JWT.
        Mode must be uppercase: BLE, QRCode, or Manual.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseCode, mode]
              properties:
                courseCode: { type: string, example: CS3101 }
                mode:       { type: string, enum: [BLE, QRCode, Manual] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  session: { $ref: "#/components/schemas/ProfessorSession" }
        "400":
          description: Active session already exists

  /api/professor/session/end/{sessionId}:
    post:
      tags: [Professor]
      summary: End an attendance session
      description: Forwards to Soham's /endSession/:sessionId using professor's JWT.
      parameters:
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Session ended

  /api/professor/session/{sessionId}/summary:
    get:
      tags: [Professor]
      summary: Session attendance summary (enrolled vs marked count)
      parameters:
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Summary from Soham's /attendance/:sessionId

  /api/professor/{professorId}/course/{courseCode}/attendance:
    get:
      tags: [Professor]
      summary: Per-student attendance for a course
      description: Proxies to Soham's /analytics/course/:courseCode/students.
      parameters:
        - { name: professorId, in: path, required: true, schema: { type: string } }
        - { name: courseCode, in: path, required: true, schema: { type: string, example: CS3101 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseCode: { type: string }
                  students:
                    type: array
                    items:
                      type: object
                      properties:
                        studentId:  { type: string }
                        name:       { type: string }
                        attended:   { type: integer }
                        total:      { type: integer }
                        percentage: { type: number }

  /api/professor/session/{sessionId}/manualAttendance:
    post:
      tags: [Professor]
      summary: Manually mark attendance for a list of students
      description: |
        Proxies to Soham's POST /manualAttendance/bulk using professor's JWT.
        Used by professor to directly mark students present without BLE/QR verification.
      parameters:
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  items: { type: string }
                  example: ["CS22B0001", "CS22B0002"]
      responses:
        "200":
          description: Attendance marked for all provided students

  /api/professor/{courseId}/schedule:
    post:
      tags: [Professor]
      summary: Add a schedule entry to a course
      description: Proxies to Soham's POST /courses/:courseId/schedule using professor's JWT.
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: string, example: CS3101 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scheduledDay: { type: string, example: Monday }
                startTime:    { type: string, example: "09:00" }
                endTime:      { type: string, example: "09:55" }
                method:       { type: string, enum: [BLE, QRCode, Manual] }
      responses:
        "200":
          description: Schedule entry created

  /api/professor/{courseId}/schedule/{scheduleId}:
    patch:
      tags: [Professor]
      summary: Update a schedule entry
      description: Proxies to Soham's PATCH /courses/:courseId/schedule/:scheduleId using professor's JWT.
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: string } }
        - { name: scheduleId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scheduledDay: { type: string }
                startTime:    { type: string }
                endTime:      { type: string }
                method:       { type: string }
      responses:
        "200":
          description: Schedule entry updated
    delete:
      tags: [Professor]
      summary: Delete a schedule entry
      description: Proxies to Soham's DELETE /courses/:courseId/schedule/:scheduleId using professor's JWT.
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: string } }
        - { name: scheduleId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Schedule entry deleted

  # ─── BLE ───────────────────────────────────────────────────────────────────

  /api/ble/major/{classroom}:
    get:
      tags: [BLE]
      summary: Beacon major for a classroom
      description: |
        Returns the BLE beacon major from our classroomMajors mapping.
        iOS uses this to filter scanned beacons before validation.
        LH-1→100, LH-2→101, LH-7→102, LH-12→103.
      security: []
      parameters:
        - { name: classroom, in: path, required: true, schema: { type: string, example: LH-1 } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  classroom: { type: string }
                  major:     { type: string, example: "100" }
        "404":
          description: No beacon registered for this classroom

  /api/ble/validate:
    post:
      tags: [BLE]
      summary: Validate BLE beacon attendance
      description: |
        iOS sends ALL raw readings from 3s scan.
        We group by major+minor, compute median RSSI per unique beacon,
        then forward deduplicated list to Abhay's /ble/validate.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id, beacons]
              properties:
                class_id: { type: string, example: LH-1 }
                beacons:
                  type: array
                  description: All raw readings (multiple per beacon OK — backend deduplicates)
                  items: { $ref: "#/components/schemas/Beacon" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }

  # ─── QR ────────────────────────────────────────────────────────────────────

  /api/qr/generate:
    post:
      tags: [QR]
      summary: Generate QR hash for a classroom (professor screen)
      description: |
        Proxies to Abhay's /qr/generate.
        Professor screen calls this every 5 seconds and renders the hash as a QR image.
        QR encodes "class_id|hash" so student app can extract both.
        class_id is the course code (e.g. CS3101), NOT the venue/room.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id]
              properties:
                class_id: { type: string, example: CS3101, description: Course code, not room/venue }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:       { type: string, example: a1b2c3d4 }
                  expires_in: { type: integer, example: 15, description: Seconds until hash expires }

  /api/qr/validate:
    post:
      tags: [QR]
      summary: Validate scanned QR hash (student screen)
      description: |
        Proxies to Abhay's /qr/validate.
        Student scans QR → app decodes "class_id|hash" → sends here with current timestamp (ms).
        class_id must be the course code (e.g. CS3101) — same value used during generation.
        Abhay validates hash freshness (15s window) and returns valid/invalid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id, hash, timestamp]
              properties:
                class_id:  { type: string, example: CS3101, description: Course code, not room/venue }
                hash:      { type: string, example: a1b2c3d4 }
                timestamp: { type: integer, description: Current Unix timestamp in milliseconds }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }

  # ═══════════════════════════════════════════════════════════════════════════
  # UPSTREAM APIs (called by this gateway — documented for reference)
  # ═══════════════════════════════════════════════════════════════════════════

  x-upstream-soham:
    description: |
      Soham's Professor Backend — https://attendance-management-gazr.onrender.com
      
      Endpoints we call:
      - POST /login — service account auth (admin@iith.ac.in)
      - GET /student/:id/courses — enrolled courses
      - GET /student/:id/history/:courseId — attendance history
      - GET /student/:id/profile — profile + imageURL
      - PATCH /student/:id/photo — update imageURL (student JWT required)
      - GET /activeSession?course_id= — active session for a course
      - GET /attendance/:sessionId — attendance records for a session
      - POST /markAttendance — mark student attendance
      - GET /courses/:profId — professor's courses
      - POST /startSession — start session (professor JWT required)
      - POST /endSession/:sessionId — end session
      - GET /analytics/course/:courseCode/students — per-student analytics
      - POST /admin/students — create student
      - POST /admin/enroll — enroll student in course
      - GET /admin/courses — all courses (used for course name cache)

  x-upstream-krishna:
    description: |
      Krishna's Face Recognition — https://attendance-management-hpuj.onrender.com
      
      Endpoints we call:
      - POST /verify — {user_id, frames, instructions} → {status: "verified"|"failed"|"no_face"}
      - POST /enroll — {user_id, frames} → {status: "enrolled"|"no_face"}
      
      user_id format: email prefix (es22btech11033, not ES22BTECH11033)

  x-upstream-abhay:
    description: |
      Abhay's BLE/QR Microservice — https://ble-qr-microservice.onrender.com
      
      Endpoints we call:
      - POST /ble/validate — {class_id, beacons:[{major,minor,rssi}]} → {valid: bool}
      - POST /qr/generate — {class_id} → {hash, expires_in}
      - POST /qr/validate — {class_id, hash, timestamp} → {valid: bool}
      
      Note: timestamp must be in milliseconds. QR hash expires in 15 seconds.

  x-upstream-s3:
    description: |
      AWS S3 — bucket: attendance-app-faces (ap-southeast-2)
      
      Operations:
      - PutObject — upload face photo as photos/<uuid>.jpg
      - HeadObject — get LastModified for 6-month expiry check
      - GetObject (presigned) — generate 1hr presigned URL for profile photo display
      
      Keys use random UUID (not student ID) for security.
